<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Afnan 💖</title>

    <meta name="theme-color" content="#ffd6ea">

    <link rel="icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/72x72/1f490.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="petals"></div>
<div id="stars"></div>

<div class="gradient one"></div>
<div class="gradient two"></div>

<main class="hero">

    <div class="glass-card">

        <div class="avatar-wrap">

            <div class="ring"></div>

            <div class="avatar">
                🧸
            </div>

        </div>

        <h1>Hi, Afnan 💖</h1>

        <h2>Nice to meet you.</h2>

        <p id="typing"></p>

        <div class="buttons">

            <button id="letterBtn">
                💌 Read My Letter
            </button>

            <button id="musicBtn">
                🎵 Music
            </button>

        </div>

    </div>

</main>

<div class="overlay" id="overlay">

    <div class="envelope">

        <div class="paper">

            <button id="closeBtn" class="close">
                ×
            </button>

            <h2>Dear Afnan 🌸</h2>

            <p>

                Hello!

                <br><br>

                I'm Victor.

                <br><br>

                I made this little website just for you.

                <br><br>

                I simply wanted to say...

                <br><br>

                <strong>Nice to meet you.</strong>

                💕

                <br><br>

                May every day bring you smiles,
                peace,
                happiness,
                and beautiful memories.

                🌸✨

            </p>

        </div>

    </div>

</div>

<footer>

Made with ❤️ by Victor

</footer>

<script src="script.js"></script>

</body>
</html>
