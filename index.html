<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Afnan ✨</title>
    <style>
        /* --- 基础与移动端优先样式 (Base & Mobile First Styles) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent; /* 移除移动端点击高亮 */
        }

        body {
            /* 💖 粉白渐变背景 */
            background: linear-gradient(135deg, #ffe5ec 0%, #fff0f3 50%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 🌸 樱花画布 */
        #sakura-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* --- ✨ 毛玻璃卡片 (Glassmorphism Card) --- */
        .container {
            width: 85%;
            max-width: 360px; /* 完美适配手机屏幕 */
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(255, 182, 193, 0.2);
            z-index: 10;
            transform: translateY(0);
            transition: all 0.3s ease;
        }

        /* --- 🧸 漂浮头像 (Floating Avatar) --- */
        .avatar-wrapper {
            position: relative;
            width: 90px;
            height: 90px;
            margin: 0 auto 25px;
            animation: float 3.5s ease-in-out infinite;
        }

        .avatar {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            box-shadow: 0 8px 20px rgba(255, 154, 162, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.6);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(3deg); }
        }

        /* --- ⌨️ 打字机效果文本 (Typewriter Container) --- */
        .greeting-text {
            font-size: 1.35rem;
            color: #4a4a4a;
            font-weight: 600;
            line-height: 1.5;
            min-height: 60px; /* 防止文本换行时撑开卡片 */
            margin-bottom: 25px;
        }

        /* 闪烁的光标 */
        .cursor {
            display: inline-block;
            width: 2px;
            background-color: #ffb6c1;
            animation: blink 0.8s infinite;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* 💌 信件按钮 */
        .open-btn {
            background: linear-gradient(135deg, #ff9aa2 0%, #ffb7b2 100%);
            border: none;
            padding: 12px 30px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 154, 162, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .open-btn:active {
            transform: scale(0.95);
        }

        /* --- 💌 信件弹窗 (Letter Modal) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 229, 236, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .letter-box {
            width: 85%;
            max-width: 340px;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 30px 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            transform: scale(0.8) translateY(30px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left;
            position: relative;
        }

        .modal-overlay.active .letter-box {
            transform: scale(1) translateY(0);
        }

        .letter-content {
            color: #5c5c5c;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .letter-content h3 {
            color: #ff8b94;
            margin-bottom: 12px;
        }

        .close-btn {
            position: absolute;
            top: 12px;
            right: 15px;
            font-size: 24px;
            color: #aaa;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #ff8b94;
        }

        /* --- 💕 点击爱心特效样式 --- */
        .click-heart {
            position: fixed;
            font-size: 24px;
            pointer-events: none;
            z-index: 9999;
            animation: heartBurst 0.8s ease-out forwards;
            user-select: none;
        }

        @keyframes heartBurst {
            0% {
                transform: translate(-50%, -50%) scale(0.5) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -100px) scale(1.4) rotate(15deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <canvas id="sakura-canvas"></canvas>

    <div class="container">
        <div class="avatar-wrapper">
            <div class="avatar">🧸</div>
        </div>
        
        <div class="greeting-text">
            <span id="typewriter"></span><span class="cursor">|</span>
        </div>

        <button class="open-btn" onclick="toggleModal(true)">Open Letter 💌</button>
    </div>

    <div class="modal-overlay" id="letterModal" onclick="closeModalOnBackdrop(event)">
        <div class="letter-box">
            <span class="close-btn" onclick="toggleModal(false)">&times;</span>
            <div class="letter-content">
                <h3>Dear Afnan,</h3>
                <p>I'm so glad our paths crossed! Hope this little digital cherry blossom brings a smile to your face today. ✨</p>
                <br>
                <p>Wishing you a wonderful day ahead!</p>
                <br>
                <p style="text-align: right; font-weight: bold; color: #ff9aa2;">— Victor 🌸</p>
            </div>
        </div>
    </div>

    <script>
        /* ================= ⌨️ 打字机效果 (Typewriter) ================= */
        const text = "I am Victor, nice to meet you Afnan.";
        let index = 0;
        const speed = 100; // 每个字母的打字速度(毫秒)

        function typeWriter() {
            if (index < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(index);
                index++;
                setTimeout(typeWriter, speed);
            }
        }
        // 页面加载完成后开始打字
        window.onload = () => {
            typeWriter();
        };

        /* ================= 💌 弹窗控制 (Modal Control) ================= */
        function toggleModal(show) {
            const modal = document.getElementById('letterModal');
            if (show) {
                modal.classList.add('active');
            } else {
                modal.classList.remove('active');
            }
        }

        function closeModalOnBackdrop(e) {
            // 点击弹窗外部背景时关闭
            if (e.target.id === 'letterModal') {
                toggleModal(false);
            }
        }

        /* ================= 💕 点击屏幕爱心特效 (Click Heart Effect) ================= */
        const heartTypes = ['💕', '💖', '🌸', '💘'];
        document.addEventListener('click', function(e) {
            // 排除点击按钮和关闭键，避免遮挡
            if(e.target.tagName === 'BUTTON' || e.target.classList.contains('close-btn')) return;

            const heart = document.createElement('div');
            heart.className = 'click-heart';
            // 随机选择心形或樱花
            heart.innerHTML = heartTypes[Math.floor(Math.random() * heartTypes.length)];
            
            heart.style.left = e.clientX + 'px';
            heart.style.top = e.clientY + 'px';
            
            document.body.appendChild(heart);
            
            // 动画结束后移除元素
            heart.addEventListener('animationend', () => {
                heart.remove();
            });
        });

        /* ================= 🌸 樱花飘落动画 (Sakura Falling Canvas) ================= */
        const canvas = document.getElementById('sakura-canvas');
        const ctx = canvas.getContext('2d');

        let petalsArray = [];
        const maxPetals = 40; // 手机端限制数量，保证流畅度

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Petal {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 8 + 6;
                this.speedX = Math.random() * 1.5 + 0.5;
                this.speedY = Math.random() * 1.5 + 1;
                this.angle = Math.random() * 360;
                this.spin = Math.random() * 2 - 1;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                this.angle += this.spin;

                // 走出边界后重置到顶部
                if (this.y > canvas.height || this.x > canvas.width) {
                    this.y = -10;
                    this.x = Math.random() * canvas.width;
                    this.speedY = Math.random() * 1.5 + 1;
                    this.speedX = Math.random() * 1.5 + 0.5;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                
                // 绘制樱花瓣形状
                ctx.beginPath();
                ctx.fillStyle = 'rgba(255, 182, 193, 0.75)';
                // 简单椭圆花瓣
                ctx.ellipse(0, 0, this.size, this.size / 1.5, 0, 0, 2 * Math.PI);
                ctx.fill();
                
                ctx.restore();
            }
        }

        function initPetals() {
            for (let i = 0; i < maxPetals; i++) {
                petalsArray.push(new Petal());
            }
        }

        function animatePetals() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            petalsArray.forEach(petal => {
                petal.update();
                petal.draw();
            });
            requestAnimationFrame(animatePetals);
        }

        initPetals();
        animatePetals();
    </script>
</body>
</html>
